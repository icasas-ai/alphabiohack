services:
  db:
    image: postgres:16
    container_name: myalphapulse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: myalphapulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myalphapulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.26
    container_name: myalphapulse-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myalphapulse-app
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - .env.local
    environment:
      DB_USER: postgres
      DB_PASS: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: myalphapulse
      DB_QUERY: schema=public
      EMAIL_PROVIDER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      HOSTNAME: 0.0.0.0
    ports:
      - "9001:9001"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - next_cache:/app/.next
    command: npm run dev:docker

volumes:
  postgres_data:
  app_node_modules:
  next_cache:
